name: Dataset Build

on:
  workflow_dispatch:
    # Allow manual trigger
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dataset-build-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Cache raw collection data
      uses: actions/cache@v4
      with:
        path: data/raw
        key: raw-cache-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          raw-cache-${{ runner.os }}-

    - name: Prepare GitHub Pages config
      run: |
        python - <<'PY'
        from pathlib import Path
        import os
        import yaml

        source = Path("plamoindex.yml")
        config = yaml.safe_load(source.read_text(encoding="utf-8")) or {}
        owner = os.environ["GITHUB_REPOSITORY_OWNER"]
        repo = os.environ["GITHUB_REPOSITORY"].split("/", 1)[1]
        config.setdefault("dataset", {})["base_url"] = f"https://{owner}.github.io/{repo}"

        target = Path("plamoindex.github.yml")
        target.write_text(
            yaml.safe_dump(config, sort_keys=False, allow_unicode=True),
            encoding="utf-8",
        )
        print(f"dataset.base_url={config['dataset']['base_url']}")
        PY

    - name: Validate curated data
      run: |
        plamoindex curated validate curated/

    - name: Build dataset
      run: |
        plamoindex sync \
          --source all \
          --curated curated/ \
          --raw data/raw/ \
          --dist dist/ \
          --config plamoindex.github.yml

    - name: Validate output
      run: |
        plamoindex validate --dist dist/

    - name: Add dataset landing page
      run: |
        cat > dist/index.html <<'HTML'
        <!doctype html>
        <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>plamoindex dataset</title>
          </head>
          <body>
            <main>
              <h1>plamoindex dataset</h1>
              <ul>
                <li><a href="./index.json">index.json</a></li>
                <li><a href="./manuals.latest.json">manuals.latest.json</a></li>
                <li><a href="./products.latest.json">products.latest.json</a></li>
                <li><a href="./relationships.v1.json">relationships.v1.json</a></li>
                <li><a href="./checksums.json">checksums.json</a></li>
              </ul>
            </main>
          </body>
        </html>
        HTML

    - name: Upload dist artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dataset-dist
        path: dist/
        retention-days: 14

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
